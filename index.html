<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente Acadêmico</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e29;
      --border: #252836;
      --accent: #6c8fff;
      --accent2: #a78bfa;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --user-bubble: #1e2340;
      --ai-bubble: #161a26;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(108,143,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(167,139,250,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 600;
      color: var(--text); line-height: 1.2;
    }

    .header-text p {
      font-size: 13px; color: var(--text-muted);
      margin-top: 2px; font-weight: 300;
    }

    .chat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 16px 20px 0;
    }

    .chip {
      font-size: 12px; padding: 5px 14px;
      border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, color .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }

    .messages {
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 320px; max-height: 460px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px;
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; font-size: 14px;
    }
    .avatar.ai   { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .avatar.user { background: var(--surface2); border: 1px solid var(--border); font-size: 15px; }

    .bubble {
      max-width: 78%; padding: 12px 16px; border-radius: 16px;
      font-size: 14.5px; line-height: 1.65; font-weight: 400;
      white-space: pre-wrap;
    }

    .msg.ai .bubble {
      background: var(--ai-bubble); border: 1px solid var(--border);
      border-top-left-radius: 4px; color: var(--text);
    }

    .msg.ai .bubble.typing { color: var(--text-muted); font-style: italic; }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(108,143,255,0.2);
      border-top-right-radius: 4px; color: var(--text);
    }

    .input-area {
      padding: 16px 20px; border-top: 1px solid var(--border);
      background: var(--surface2); display: flex; gap: 10px; align-items: flex-end;
    }

    textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      resize: none; outline: none;
      min-height: 46px; max-height: 120px; line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea:focus    { border-color: var(--accent); }
    textarea:disabled { opacity: .5; }

    button {
      width: 46px; height: 46px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, transform 0.15s;
    }
    button:hover:not(:disabled)  { opacity: 0.88; transform: scale(1.04); }
    button:active:not(:disabled) { transform: scale(0.96); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button svg { width: 18px; height: 18px; }

    .footer-note {
      text-align: center; font-size: 11.5px;
      color: var(--text-muted); margin-top: 14px; font-weight: 300;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo">🎓</div>
    <div class="header-text">
      <h1>Assistente Acadêmico</h1>
      <p>Tire suas dúvidas de forma clara e rápida</p>
    </div>
  </header>

  <div class="chat-box">

    <div class="chips">
      <span class="chip" onclick="quickSend('Qual o horário da aula?')">Horário da aula</span>
      <span class="chip" onclick="quickSend('Quero calcular minha média')">Calcular média</span>
      <span class="chip" onclick="quickSend('Quero verificar minhas faltas')">Verificar faltas</span>
    </div>

    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="avatar ai">🎓</div>
        <div class="bubble">Olá! Sou seu assistente acadêmico. Como posso te ajudar hoje?</div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        placeholder="Digite sua dúvida..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="enviar()" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <p class="footer-note">Respostas podem conter erros — sempre revise</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  // modo controla o que o próximo envio do usuário significa:
  // null     → pergunta livre
  // 'notas'  → usuário vai digitar as notas
  // 'faltas' → usuário vai digitar o número de faltas
  // 'total'  → usuário vai digitar o total de aulas
  let modo   = null;
  let faltas = null;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  }

  function quickSend(text) {
    inputEl.value = text;
    enviar();
  }

  function setLoading(on) {
    inputEl.disabled = on;
    sendBtn.disabled = on;
  }

  function addMessage(role, content, extraClass = '') {
    const div    = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '🎓' : '🖐';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extraClass ? ' ' + extraClass : '');
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  // Envia requisição POST para o Flask e retorna o JSON
  async function chamarFlask(rota, corpo) {
    const res = await fetch(rota, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(corpo)
    });
    return res.json();
  }

  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto) return;

    addMessage('user', texto);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    inputEl.focus();
    setLoading(true);

    const typing = addMessage('ai', 'Processando...', 'typing');

    try {
      let resposta = '';

      if (modo === 'notas') {
        // Usuário enviou as notas → manda para /calcular_media no Flask
        const dados = await chamarFlask('/calcular_media', { notas: texto });
        resposta = dados.texto;
        modo = null;

      } else if (modo === 'faltas') {
        // Usuário enviou as faltas → guarda e pede o total de aulas
        faltas   = texto;
        modo     = 'total';
        resposta = 'Quantas aulas no total?';

      } else if (modo === 'total') {
        // Usuário enviou o total → manda tudo para /calcular_faltas no Flask
        const dados = await chamarFlask('/calcular_faltas', { faltas, total: texto });
        resposta = dados.texto;
        modo   = null;
        faltas = null;

      } else {
        // Pergunta livre → manda para /perguntar no Flask (função condicionais)
        const dados = await chamarFlask('/perguntar', { pergunta: texto });

        if (dados.tipo === 'pedir_notas') {
          modo     = 'notas';
          resposta = 'Digite suas notas separadas por espaço ou vírgula:';
        } else if (dados.tipo === 'pedir_faltas') {
          modo     = 'faltas';
          resposta = 'Quantas faltas você teve?';
        } else {
          resposta = dados.texto;
        }
      }

      typing.textContent = resposta;
      typing.classList.remove('typing');

    } catch (err) {
      typing.textContent = 'Erro ao conectar com o servidor. Verifique se o Flask está rodando.';
      typing.classList.remove('typing');
    }

    setLoading(false);
  }
</script>
</body>
</html>
